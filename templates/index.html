<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Puppy Love - Dog Dating</title>
</head>
<body>
    <h1>Welcome to Puppy Love!</h1>
    <p>Find your dog a date!</p>

        <p class="dog-name">Cosmo</p>

    </div>

    <div class="image-container">
        <img src="{{ url_for('static', filename='images/img1.webp') }}" alt="Dog 1">
        <img src="{{ url_for('static', filename='images/img2.webp') }}" alt="Dog 2">
    </div>
    
</body>
</html>
